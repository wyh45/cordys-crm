# Production config — embedded services disabled, use docker-compose services
mysql.embedded.enabled=false
redis.embedded.enabled=false
mcp.embedded.enabled=false

# SMS (override via env)
tencentcloud.sms.enabled=${TENCENT_SMS_ENABLED:false}
tencentcloud.sms.secret-id=${TENCENT_SMS_SECRET_ID:}
tencentcloud.sms.secret-key=${TENCENT_SMS_SECRET_KEY:}
tencentcloud.sms.sms-sdk-app-id=${TENCENT_SMS_APP_ID:}
tencentcloud.sms.sign-name=${TENCENT_SMS_SIGN_NAME:}
tencentcloud.sms.template-id=${TENCENT_SMS_TEMPLATE_ID:}
tencentcloud.sms.invite-template-id=${TENCENT_SMS_INVITE_TEMPLATE_ID:}

# Dify AI
dify.api.type=${DIFY_API_TYPE:chat}
dify.api.url=${DIFY_API_URL:}
dify.api.key=${DIFY_API_KEY:}
dify.risk.api.key=${DIFY_RISK_API_KEY:}
dify.sms.api.key=${DIFY_SMS_API_KEY:}
dify.api.timeout=${DIFY_API_TIMEOUT:120000}

# Health API
health.api.base-url=${HEALTH_API_BASE_URL:}
health.api.app-id=${HEALTH_API_APP_ID:}
health.api.secret=${HEALTH_API_SECRET:}
