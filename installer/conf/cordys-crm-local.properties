logger.sql.level=info
management.endpoints.enabled-by-default=false
springdoc.api-docs.groups.enabled=true
spring.freemarker.check-template-location=false
spring.groovy.template.check-template-location=false

# 默认 all in one 配置，单机环境使用
mysql.embedded.enabled=true
# 本地开发配置（手动修改）
mysql.embedded.enabled=false
spring.datasource.url=jdbc:mysql://127.0.0.1:3306/cordys_crm?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=CordysCRM@mysql
spring.session.timeout=30d

redis.embedded.enabled=false
spring.data.redis.host=127.0.0.1
spring.data.redis.password=CordysCRM@redis
spring.data.redis.port=6379
spring.session.redis.repository-type=indexed

# MCP Server 配置
mcp.embedded.enabled=true
cordys.crm.url=http://127.0.0.1:8081
spring.mvc.async.request-timeout=60000
spring.ai.mcp.server.type=ASYNC
spring.ai.mcp.server.name=cordys-crm-mcp-server
spring.ai.mcp.server.version=1.0.0

# SQLBot 默认获取 spring.datasource 配置访问数据库，支持自定义配置只读用户
# sqlbot.datasource.username=Read-only-user
# sqlbot.datasource.password=CordysCRM@mysql

# 支持加密 API /db/structure 返回的敏感数据，默认 false
# sqlbot.encrypt=false
# sqlbot.aes-key=your-aes-key
# sqlbot.aes-iv=your-aes-iv

# 启用白名单功能,不开启则不限制访问
dashboard.whitelist.enabled=false
# 白名单开关开启后允许访问的IP地址或域名列表,多个用逗号分隔
dashboard.whitelist.allowed=

# ========== 腾讯云短信配置 ==========
# 是否启用短信功能（本地开发建议先关闭，配置好腾讯云凭证后再开启）
tencentcloud.sms.enabled=false
# 腾讯云 SecretId（建议通过环境变量 TENCENTCLOUD_SECRET_ID 传入）
tencentcloud.sms.secret-id=${TENCENTCLOUD_SECRET_ID:}
# 腾讯云 SecretKey（建议通过环境变量 TENCENTCLOUD_SECRET_KEY 传入）
tencentcloud.sms.secret-key=${TENCENTCLOUD_SECRET_KEY:}
# 短信应用 App ID（腾讯云短信控制台查看）
tencentcloud.sms.sms-sdk-app-id=1400006666
# 短信签名（需审核通过）
tencentcloud.sms.sign-name=CordysCRM
# 短信模板 ID（需审核通过）
tencentcloud.sms.template-id=449739
# 接入地域
tencentcloud.sms.region=ap-guangzhou
